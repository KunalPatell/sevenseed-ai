# Sevenseed Monolith — 1 Render Service hosting Sevenseed Hub + 7 Child Apps
#
# Single web service definition that builds all frontends and runs the unified FastAPI backend.

services:
  - type: web
    name: sevenseed
    env: docker
    dockerfilePath: apps/sevenseed/Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER
        sync: false
