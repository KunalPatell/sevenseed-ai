# Sevenseed platform — one Blueprint, one repo, 8 services.
#
#   PARENT  : sevenseed        (the hub that handles all seven ventures)
#   CHILDREN: sevenforce-ai, avpu-ai, avp-emart, avp-charitable-trust,
#             breakdown-factor, decode-forest-pharmacy, comonk-ai
#
# `rootDir` is what makes the monorepo work: each service builds only from its own
# folder, so a push that touches apps/avpu/ does not rebuild the other seven.
# Every service below keeps the exact env vars and settings it had in its own
# standalone render.yaml — only rootDir is new.
#
# NOTE ON PLANS: all eight are still `plan: free`. The free tier shares ~750
# instance-hours/month across the whole account, so eight always-on services do not
# fit and every one of them will keep spinning down and cold-starting. To get an
# always-warm hub, upgrade `sevenseed` (~730 hrs/month fits a single service) and
# let the children stay free / on-demand. That is a billing decision — left as-is.

services:
  # ────────────────────────────── PARENT ──────────────────────────────
  - type: web
    name: sevenseed
    rootDir: apps/sevenseed
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

  # ───────────────────────────── CHILDREN ─────────────────────────────
  - type: web
    name: sevenforce-ai
    rootDir: apps/sevenforce
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER
        sync: false

  - type: web
    name: avpu-ai
    rootDir: apps/avpu
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

  - type: web
    name: avp-emart
    rootDir: apps/avp-emart
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

  - type: web
    name: avp-charitable-trust
    rootDir: apps/avp-charitable-trust
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

  - type: web
    name: breakdown-factor
    rootDir: apps/breakdown-factor
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

  - type: web
    name: decode-forest-pharmacy
    rootDir: apps/decode-forest-pharmacy
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

  # comonk is the one live-in-production child and the only non-docker service.
  # Keep it last: repoint it on Render only after the other seven are confirmed green.
  - type: web
    name: comonk-ai
    rootDir: apps/comonk
    runtime: python
    buildCommand: pip install -r requirements_comonk.txt
    startCommand: python comonk_backend.py
    envVars:
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_API_KEY
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: WAKATIME_API_KEY
        sync: false
      - key: ABSTRACT_API_KEY
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
